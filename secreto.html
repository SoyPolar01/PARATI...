<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sección Secreta 🔒</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        .lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a0509; z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            flex-direction: column; color: white;
            transition: opacity 0.8s, visibility 0.8s;
        }
        .lock-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            padding: 3rem; border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; width: 90%; max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .lock-icon { font-size: 4rem; margin-bottom: 1.5rem; display: block; }
        .lock-card input {
            width: 100%; padding: 1rem; border-radius: 20px; border: none;
            margin: 1.5rem 0; outline: none; text-align: center; font-size: 1.2rem;
            background: rgba(255,255,255,0.1); color: white;
        }
        .lock-card input::placeholder { color: rgba(255,255,255,0.3); }
        
        .secret-content { opacity: 0; transition: opacity 1s; }
        .revealed { opacity: 1 !important; }
    </style>
</head>
<body class="fade-in">
    <div class="aurora-bg"></div>
    
    <!-- PANTALLA DE BLOQUEO -->
    <div id="lock-screen" class="lock-screen">
        <div class="lock-card">
            <span class="lock-icon">🔒</span>
            <h2 class="dancing-title" style="color: white; font-size: 2rem;">Área Privada</h2>
            <p style="opacity: 0.6; font-size: 0.9rem;">Introduce la clave secreta para entrar</p>
            <input type="password" id="secret-pass" placeholder="••••••••">
            <button id="btn-enter" class="btn btn-primary">Desbloquear</button>
            <br><br>
            <a href="index.html" style="color: white; text-decoration: none; font-size: 0.8rem; opacity: 0.4;">← Volver al menú</a>
        </div>
    </div>

    <div id="secret-main" class="secret-content">
        <nav class="navbar">
            <div class="logo">Secreto ❤️</div>
            <div class="menu-toggle" id="mobile-menu">
                <span class="bar"></span><span class="bar"></span><span class="bar"></span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Menú</a></li>
                <li><a href="recuerdos.html">Corazones</a></li>
                <li><a href="calendario.html">Calendario</a></li>
                <li><a href="mensajes.html">Mensajes</a></li>
                <li><a href="fotos.html">Fotos</a></li>
                <li><a href="carta.html">Carta</a></li>
                <li><a href="secreto.html">Secreto 🔒</a></li>
            </ul>
        </nav>

        <main style="padding: 10rem 2rem 5rem; text-align: center;">
            <h1 class="menu-title">Sorpresa ✨</h1>
            <div class="message-card-full" style="background: var(--glass); backdrop-filter: blur(20px);">
                <p style="font-size: 1.5rem; line-height: 2;">
                    Este es un espacio solo para nosotros. <br>
                    Aquí puedes añadir lo que quieras que sea <br>
                    <strong>totalmente privado</strong>.
                </p>
                <div class="icon" style="font-size: 5rem; margin-top: 2rem;">🤫❤️</div>
            </div>
        </main>
    </div>

    <script>
        const passInput = document.getElementById('secret-pass');
        const btnEnter = document.getElementById('btn-enter');
        const lockScreen = document.getElementById('lock-screen');
        const secretMain = document.getElementById('secret-main');
        
        // Usamos la misma llave que el modo admin por simplicidad, o puedes cambiarla
        const SECRET_KEY = "14042024"; 

        function checkPass() {
            if (passInput.value === SECRET_KEY) {
                lockScreen.style.opacity = '0';
                setTimeout(() => {
                    lockScreen.style.visibility = 'hidden';
                    secretMain.classList.add('revealed');
                }, 800);
            } else {
                alert("Clave incorrecta... 🔒");
                passInput.value = "";
            }
        }

        btnEnter.onclick = checkPass;
        passInput.onkeypress = (e) => { if (e.key === 'Enter') checkPass(); };
    </script>

    <!-- Firebase SDKs (Por si los necesitas luego) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="js/scripts.js"></script>
</body>
</html>
